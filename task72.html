<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h2{
    color:#3498db;
}

.form-container{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#3498db;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

table th, table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

table th{
    background:#3498db;
    color:white;
}

.delete-btn{
    background:#e74c3c;
}

.delete-btn:hover{
    background:#c0392b;
}
</style>
</head>
<body>

<div class="container">

<h1>👨‍💼 HR Management System</h1>

<div class="dashboard">
    <div class="card">
        <h2 id="employeeCount">0</h2>
        <p>Total Employees</p>
    </div>

    <div class="card">
        <h2 id="departmentCount">0</h2>
        <p>Departments</p>
    </div>
</div>

<div class="form-container">
    <h2>Add Employee</h2>

    <div class="form-group">
        <label>Employee Name</label>
        <input type="text" id="name">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email">
    </div>

    <div class="form-group">
        <label>Department</label>
        <select id="department">
            <option>HR</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Marketing</option>
        </select>
    </div>

    <div class="form-group">
        <label>Designation</label>
        <input type="text" id="designation">
    </div>

    <button onclick="addEmployee()">Add Employee</button>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="employeeTable"></tbody>
</table>

</div>

<script>
let employees = [];
let employeeId = 1;

function addEmployee(){

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const department = document.getElementById("department").value;
    const designation = document.getElementById("designation").value;

    if(!name || !email || !designation){
        alert("Please fill all fields");
        return;
    }

    employees.push({
        id: employeeId++,
        name,
        email,
        department,
        designation
    });

    renderEmployees();
    updateDashboard();

    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("designation").value = "";
}

function renderEmployees(){
    const table = document.getElementById("employeeTable");
    table.innerHTML = "";

    employees.forEach((emp,index)=>{
        table.innerHTML += `
        <tr>
            <td>${emp.id}</td>
            <td>${emp.name}</td>
            <td>${emp.email}</td>
            <td>${emp.department}</td>
            <td>${emp.designation}</td>
            <td>
                <button class="delete-btn"
                onclick="deleteEmployee(${index})">
                Delete
                </button>
            </td>
        </tr>`;
    });
}

function deleteEmployee(index){
    employees.splice(index,1);
    renderEmployees();
    updateDashboard();
}

function updateDashboard(){
    document.getElementById("employeeCount").innerText =
        employees.length;

    const departments =
        [...new Set(employees.map(e => e.department))];

    document.getElementById("departmentCount").innerText =
        departments.length;
}
</script>

</body>
</html>
