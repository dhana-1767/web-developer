<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MongoDB Product Manager</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#2c3e50;
}

.form-container{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    margin-bottom:25px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    color:#fff;
}

.save-btn{
    background:#27ae60;
}

.edit-btn{
    background:#3498db;
}

.delete-btn{
    background:#e74c3c;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

th{
    background:#2c3e50;
    color:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:left;
}
</style>
</head>
<body>

<div class="container">

    <h1>🍃 MongoDB Product Management</h1>

    <div class="form-container">

        <input type="hidden" id="productId">

        <input type="text"
               id="name"
               placeholder="Product Name">

        <textarea id="description"
                  rows="4"
                  placeholder="Product Description"></textarea>

        <input type="number"
               id="price"
               placeholder="Product Price">

        <button class="save-btn"
                onclick="saveProduct()">
            Save Product
        </button>

    </div>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="productTable">
        </tbody>

    </table>

</div>

<script>

let products = [
{
    _id:"1",
    name:"Laptop",
    description:"Gaming Laptop",
    price:50000
},
{
    _id:"2",
    name:"Phone",
    description:"Android Smartphone",
    price:25000
}
];

function loadProducts(){

    let html = "";

    products.forEach(product => {

        html += `
        <tr>
            <td>${product._id}</td>
            <td>${product.name}</td>
            <td>${product.description}</td>
            <td>₹${product.price}</td>
            <td>
                <button class="edit-btn"
                onclick="editProduct('${product._id}')">
                Edit
                </button>

                <button class="delete-btn"
                onclick="deleteProduct('${product._id}')">
                Delete
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById("productTable").innerHTML = html;
}

function saveProduct(){

    const id =
    document.getElementById("productId").value;

    const name =
    document.getElementById("name").value;

    const description =
    document.getElementById("description").value;

    const price =
    document.getElementById("price").value;

    if(!name || !price){
        alert("Please fill all required fields");
        return;
    }

    if(id){

        const product =
        products.find(p => p._id === id);

        product.name = name;
        product.description = description;
        product.price = price;

    }else{

        products.push({
            _id: Date.now().toString(),
            name,
            description,
            price
        });
    }

    clearForm();
    loadProducts();
}

function editProduct(id){

    const product =
    products.find(p => p._id === id);

    document.getElementById("productId").value =
    product._id;

    document.getElementById("name").value =
    product.name;

    document.getElementById("description").value =
    product.description;

    document.getElementById("price").value =
    product.price;
}

function deleteProduct(id){

    if(confirm("Delete this product?")){

        products =
        products.filter(p => p._id !== id);

        loadProducts();
    }
}

function clearForm(){

    document.getElementById("productId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("description").value = "";
    document.getElementById("price").value = "";
}

loadProducts();

</script>

</body>
</html>
