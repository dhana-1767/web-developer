<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    :root {
      --bg: #eef2ff;
      --surface: #ffffff;
      --primary: #3b82f6;
      --primary-dark: #1d4ed8;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbeafe;
      --radius: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .login-wrapper {
      width: min(520px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .login-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 500px;
    }

    .login-info {
      padding: 3rem 2.5rem;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1rem;
    }

    .login-info h2 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.05;
    }

    .login-info p {
      margin: 0;
      color: rgba(255,255,255,0.9);
      line-height: 1.8;
    }

    .login-card {
      padding: 3rem 2.5rem;
      display: grid;
      gap: 1.25rem;
      justify-content: stretch;
    }

    .login-card h1 {
      margin: 0;
      font-size: 1.85rem;
    }

    .login-card label {
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      display: block;
      color: var(--muted);
    }

    .login-card input {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      font-size: 1rem;
      background: #f8fafc;
      color: var(--text);
    }

    .login-card input:focus {
      outline: 2px solid rgba(59, 130, 246, 0.28);
      border-color: var(--primary);
      background: white;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .checkbox-group input {
      width: auto;
      margin: 0;
    }

    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem 1.1rem;
      border-radius: 999px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .separator {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      position: relative;
      margin: 1rem 0;
    }

    .separator::before,
    .separator::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 36%;
      height: 1px;
      background: var(--border);
    }

    .separator::before {
      left: 0;
    }

    .separator::after {
      right: 0;
    }

    .social-login {
      display: grid;
      gap: 0.75rem;
    }

    .social-btn {
      padding: 0.95rem 1rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .social-btn:hover {
      background: #eef2ff;
      border-color: rgba(59, 130, 246, 0.25);
    }

    .social-icon {
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e0e7ff;
      color: var(--primary);
      font-weight: 700;
    }

    .signup-note {
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .signup-note a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    @media (max-width: 840px) {
      .login-panel {
        grid-template-columns: 1fr;
      }

      .login-info {
        padding: 2.5rem 2rem;
      }

      .login-card {
        padding: 2.5rem 2rem;
      }
    }

    @media (max-width: 520px) {
      .login-wrapper {
        width: 100%;
      }

      .login-info,
      .login-card {
        padding: 2rem 1.5rem;
      }

      .form-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-panel">
      <div class="login-info">
        <h2>Welcome back.</h2>
        <p>Sign in to access your dashboard, manage your account, and continue where you left off.</p>
      </div>
      <div class="login-card">
        <h1>Log in</h1>

        <div>
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>

        <div>
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" />
        </div>

        <div class="form-row">
          <label class="checkbox-group">
            <input type="checkbox" />
            Remember me
          </label>
          <a class="forgot-link" href="#">Forgot password?</a>
        </div>

        <button class="submit-btn" type="button">Sign in</button>

        <div class="separator">or continue with</div>

        <div class="social-login">
          <button class="social-btn" type="button">
            <span class="social-icon">G</span>
            Sign in with Google
          </button>
          <button class="social-btn" type="button">
            <span class="social-icon">F</span>
            Sign in with Facebook
          </button>
        </div>

        <p class="signup-note">New here? <a href="#">Create an account</a></p>
      </div>
    </div>
  </div>
</body>
</html>
