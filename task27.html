<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Listing Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f7fa;
}

/* Header */
header{
    background:#2563eb;
    color:white;
    padding:20px 5%;
}

header h1{
    text-align:center;
}

/* Search */
.search-section{
    padding:20px 5%;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.search-box{
    max-width:600px;
    margin:auto;
    display:flex;
}

.search-box input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px 0 0 8px;
}

.search-box button{
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:0 8px 8px 0;
    cursor:pointer;
}

/* Layout */
.container{
    display:grid;
    grid-template-columns:250px 1fr;
    gap:25px;
    padding:30px 5%;
}

/* Sidebar */
.sidebar{
    background:white;
    padding:20px;
    border-radius:12px;
    height:max-content;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.sidebar h3{
    margin-bottom:15px;
}

.filter-group{
    margin-bottom:25px;
}

.filter-group label{
    display:block;
    margin:10px 0;
}

/* Product Grid */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.category{
    color:#666;
    font-size:14px;
}

.title{
    margin:10px 0;
    font-size:18px;
}

.rating{
    color:#f59e0b;
    margin-bottom:10px;
}

.price{
    color:#2563eb;
    font-size:22px;
    font-weight:bold;
}

.old-price{
    text-decoration:line-through;
    color:#888;
    font-size:14px;
}

.cart-btn{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

/* Responsive */
@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}

@media(max-width:600px){

    .search-box{
        flex-direction:column;
    }

    .search-box input,
    .search-box button{
        border-radius:8px;
        width:100%;
    }

    .search-box button{
        margin-top:10px;
    }
}
</style>
</head>

<body>

<header>
    <h1>ShopEase Product Catalog</h1>
</header>

<section class="search-section">
    <div class="search-box">
        <input type="text" placeholder="Search products...">
        <button><i class="fas fa-search"></i> Search</button>
    </div>
</section>

<div class="container">

    <aside class="sidebar">

        <div class="filter-group">
            <h3>Categories</h3>

            <label><input type="checkbox"> Electronics</label>
            <label><input type="checkbox"> Fashion</label>
            <label><input type="checkbox"> Watches</label>
            <label><input type="checkbox"> Accessories</label>
        </div>

        <div class="filter-group">
            <h3>Price Range</h3>

            <label><input type="radio" name="price"> Under ₹1000</label>
            <label><input type="radio" name="price"> ₹1000 - ₹5000</label>
            <label><input type="radio" name="price"> ₹5000+</label>
        </div>

    </aside>

    <section class="products">

        <div class="card">
            <img src="https://picsum.photos/400/300?1">
            <div class="content">
                <div class="category">Electronics</div>
                <h3 class="title">Wireless Headphones</h3>
                <div class="rating">★★★★★</div>
                <div class="price">₹2,999</div>
                <div class="old-price">₹3,999</div>
                <button class="cart-btn">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/300?2">
            <div class="content">
                <div class="category">Watches</div>
                <h3 class="title">Smart Watch</h3>
                <div class="rating">★★★★☆</div>
                <div class="price">₹4,999</div>
                <div class="old-price">₹6,499</div>
                <button class="cart-btn">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/300?3">
            <div class="content">
                <div class="category">Fashion</div>
                <h3 class="title">Running Shoes</h3>
                <div class="rating">★★★★★</div>
                <div class="price">₹1,899</div>
                <div class="old-price">₹2,499</div>
                <button class="cart-btn">Add to Cart</button>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/300?4">
            <div class="content">
                <div class="category">Accessories</div>
                <h3 class="title">Bluetooth Speaker</h3>
                <div class="rating">★★★★☆</div>
                <div class="price">₹1,499</div>
                <div class="old-price">₹1,999</div>
                <button class="cart-btn">Add to Cart</button>
            </div>
        </div>

    </section>

</div>

</body>
</html>
