<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Scraping Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fc;
    min-height:100vh;
}

header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    margin-bottom:25px;
}

h2{
    margin-bottom:15px;
    color:#2563eb;
}

.input-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1e40af;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.stat-box{
    background:#eef4ff;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.stat-box h3{
    color:#2563eb;
    font-size:28px;
}

.result-area{
    background:#111827;
    color:#22c55e;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    min-height:250px;
    font-family:monospace;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#eef4ff;
}

.status{
    color:green;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
}
</style>
</head>
<body>

<header>
    <h1>🌐 Web Scraping Dashboard</h1>
    <p>Extract and Analyze Website Data</p>
</header>

<div class="container">

    <div class="card">
        <h2>Website Scraper</h2>

        <div class="input-group">
            <input
                type="text"
                id="websiteUrl"
                placeholder="Enter Website URL"
            >

            <button onclick="scrapeWebsite()">
                Start Scraping
            </button>
        </div>
    </div>

    <div class="card">
        <h2>Scraping Statistics</h2>

        <div class="stats">

            <div class="stat-box">
                <h3 id="pages">0</h3>
                <p>Pages Scraped</p>
            </div>

            <div class="stat-box">
                <h3 id="links">0</h3>
                <p>Links Found</p>
            </div>

            <div class="stat-box">
                <h3 id="images">0</h3>
                <p>Images Found</p>
            </div>

            <div class="stat-box">
                <h3 id="status">Idle</h3>
                <p>Status</p>
            </div>

        </div>
    </div>

    <div class="card">
        <h2>Scraped Data</h2>

        <div class="result-area" id="output">
Waiting for scraping results...
        </div>
    </div>

    <div class="card">
        <h2>Recent Scraping Jobs</h2>

        <table>
            <thead>
                <tr>
                    <th>Website</th>
                    <th>Pages</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="jobTable">
            </tbody>
        </table>
    </div>

</div>

<footer>
    © 2026 Web Scraping Module Dashboard
</footer>

<script>

const jobs = [];

function scrapeWebsite(){

    const url =
        document.getElementById("websiteUrl").value;

    if(!url){
        alert("Please enter a URL");
        return;
    }

    document.getElementById("status").innerText =
        "Running";

    const pages =
        Math.floor(Math.random()*50)+1;

    const links =
        Math.floor(Math.random()*500)+50;

    const images =
        Math.floor(Math.random()*200)+10;

    document.getElementById("pages").innerText =
        pages;

    document.getElementById("links").innerText =
        links;

    document.getElementById("images").innerText =
        images;

    document.getElementById("status").innerText =
        "Completed";

    const result = {
        website:url,
        pagesScraped:pages,
        linksFound:links,
        imagesFound:images,
        timestamp:new Date().toLocaleString()
    };

    document.getElementById("output").innerText =
        JSON.stringify(result,null,2);

    jobs.push({
        website:url,
        pages:pages,
        status:"Completed"
    });

    renderJobs();
}

function renderJobs(){

    const table =
        document.getElementById("jobTable");

    table.innerHTML = "";

    jobs.forEach(job => {

        table.innerHTML += `
        <tr>
            <td>${job.website}</td>
            <td>${job.pages}</td>
            <td class="status">${job.status}</td>
        </tr>
        `;
    });
}

</script>

</body>
</html>
