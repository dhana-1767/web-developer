 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Platform</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
}

header{
    background:#1877f2;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:900px;
    margin:20px auto;
    padding:15px;
}

.create-post{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

textarea{
    width:100%;
    height:100px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    background:#1877f2;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.post{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.actions{
    margin-top:10px;
}

.like-btn{
    background:#42b72a;
}
</style>
</head>
<body>

<header>
    <h1>Social Media Platform</h1>
</header>

<div class="container">

<div class="create-post">
    <h2>Create Post</h2>

    <textarea id="postContent"
    placeholder="What's on your mind?"></textarea>

    <button onclick="createPost()">
        Post
    </button>
</div>

<div id="feed"></div>

</div>

<script>

function createPost(){

    let content =
    document.getElementById("postContent").value;

    if(content.trim()===""){
        alert("Enter some content");
        return;
    }

    let post =
    document.createElement("div");

    post.className = "post";

    post.innerHTML = `
        <p>${content}</p>

        <div class="actions">
            <button class="like-btn"
            onclick="likePost(this)">
                Like (0)
            </button>
        </div>
    `;

    document
    .getElementById("feed")
    .prepend(post);

    document
    .getElementById("postContent")
    .value="";
}

function likePost(btn){

    let text = btn.innerText;

    let count =
    parseInt(text.match(/\d+/)[0]);

    count++;

    btn.innerText =
    "Like (" + count + ")";
}

</script>

</body>
</html>
