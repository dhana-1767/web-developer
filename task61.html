<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,
table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:left;
}

table th{
    background:#2563eb;
    color:white;
}
</style>
</head>
<body>

<header>
    <h1>CRM Dashboard</h1>
</header>

<div class="container">

    <div class="card">
        <h2>Add Customer</h2>

        <input type="text" id="name" placeholder="Customer Name">

        <input type="email" id="email" placeholder="Email Address">

        <select id="status">
            <option>Lead</option>
            <option>Qualified</option>
            <option>Customer</option>
        </select>

        <button onclick="addCustomer()">
            Add Customer
        </button>
    </div>

    <div class="card">
        <h2>Search Customer</h2>

        <input type="text"
               id="search"
               placeholder="Search..."
               onkeyup="searchCustomer()">
    </div>

    <div class="card">
        <h2>Customer Records</h2>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="customerTable"></tbody>
        </table>
    </div>

</div>

<script>

function addCustomer(){

    let name =
    document.getElementById("name").value;

    let email =
    document.getElementById("email").value;

    let status =
    document.getElementById("status").value;

    if(name==="" || email===""){
        alert("Please fill all fields");
        return;
    }

    let table =
    document.getElementById("customerTable");

    let row = table.insertRow();

    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = email;
    row.insertCell(2).innerHTML = status;

    document.getElementById("name").value="";
    document.getElementById("email").value="";
}

function searchCustomer(){

    let filter =
    document.getElementById("search")
    .value.toLowerCase();

    let rows =
    document.querySelectorAll("#customerTable tr");

    rows.forEach(row=>{
        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(filter) ? "" : "none";
    });
}

</script>

</body>
</html>
