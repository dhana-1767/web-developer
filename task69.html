<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Examination System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#2563eb;
}

.timer{
    text-align:right;
    font-size:20px;
    color:red;
    margin-bottom:20px;
}

.question{
    margin:20px 0;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>Online Examination</h1>

<div class="timer">
Time Left: <span id="time">60</span>s
</div>

<form id="examForm">

<div class="question">
<p>1. Which HTML tag creates a hyperlink?</p>

<input type="radio" name="q1" value="a"> &lt;a&gt;<br>
<input type="radio" name="q1" value="img"> &lt;img&gt;<br>
<input type="radio" name="q1" value="div"> &lt;div&gt;
</div>

<div class="question">
<p>2. Which language is used for web styling?</p>

<input type="radio" name="q2" value="css"> CSS<br>
<input type="radio" name="q2" value="python"> Python<br>
<input type="radio" name="q2" value="java"> Java
</div>

<div class="question">
<p>3. JavaScript is a?</p>

<input type="radio" name="q3" value="programming">
Programming Language<br>

<input type="radio" name="q3" value="database">
Database<br>

<input type="radio" name="q3" value="os">
Operating System
</div>

<button type="button" onclick="submitExam()">
Submit Exam
</button>

</form>

<div class="result" id="result"></div>

</div>

<script>

let timeLeft = 60;

let timer = setInterval(() => {

    document.getElementById("time")
    .innerText = timeLeft;

    timeLeft--;

    if(timeLeft < 0){
        clearInterval(timer);
        submitExam();
    }

},1000);

function submitExam(){

    clearInterval(timer);

    let score = 0;

    let answers = {
        q1:"a",
        q2:"css",
        q3:"programming"
    };

    for(let key in answers){

        let selected =
        document.querySelector(
        `input[name="${key}"]:checked`
        );

        if(selected &&
           selected.value === answers[key]){
            score++;
        }
    }

    document.getElementById("result")
    .innerHTML =
    `Your Score: ${score} / 3`;
}

</script>

</body>
</html>
