<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --primary: #2563eb;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbeafe;
      --radius: 28px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(37, 99, 235, 0.12), transparent 35%),
                  linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .reset-card {
      width: min(520px, 100%);
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 30px 90px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .reset-header {
      padding: 2.5rem 2rem 1.5rem;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
    }

    .reset-header h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.75rem);
      line-height: 1.05;
    }

    .reset-header p {
      margin: 1rem 0 0;
      color: rgba(255, 255, 255, 0.88);
      line-height: 1.75;
    }

    .reset-form {
      padding: 2rem;
      display: grid;
      gap: 1.5rem;
    }

    .form-group {
      display: grid;
      gap: 0.5rem;
    }

    label {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 1rem 1.1rem;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--text);
      font-size: 1rem;
    }

    input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.24);
      border-color: var(--primary);
      background: white;
    }

    .submit-button {
      width: 100%;
      padding: 1rem 1.1rem;
      border-radius: 999px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .submit-button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }

    .hint {
      display: grid;
      gap: 0.5rem;
      padding: 1rem 1.1rem;
      border-radius: 20px;
      background: #eff6ff;
      border: 1px solid rgba(37, 99, 235, 0.12);
      color: var(--text);
      font-size: 0.95rem;
    }

    .hint strong {
      color: var(--primary);
    }

    .back-link {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 520px) {
      .reset-header,
      .reset-form {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="reset-card">
    <div class="reset-header">
      <h1>Forgot your password?</h1>
      <p>Enter your email and we’ll send you a secure link to reset it.</p>
    </div>
    <form class="reset-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <button class="submit-button" type="submit">Send reset link</button>
      <div class="hint">
        <strong>Tip:</strong> Check your spam folder if you don’t receive the reset link within a few minutes.
      </div>
      <p class="back-link">Remembered it? <a href="#">Sign in instead</a></p>
    </form>
  </div>
</body>
</html>
