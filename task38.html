<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f5f7fa;
}

header{
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card h3{
    color:#333;
    margin-bottom:10px;
}

.description{
    color:#666;
    margin-bottom:15px;
    line-height:1.5;
}

.price{
    color:#16a34a;
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.btn{
    display:inline-block;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:10px 18px;
    border-radius:6px;
}

.btn:hover{
    background:#1d4ed8;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:#111827;
    color:white;
}
</style>
</head>

<body>

<header>
    <h1>🛒 Product Management System</h1>
    <p>Powered by Django</p>
</header>

<div class="container">

    <div class="product-grid">

        {% for product in products %}

        <div class="card">

            <img src="https://via.placeholder.com/400x250" alt="Product">

            <div class="card-content">

                <h3>{{ product.name }}</h3>

                <p class="description">
                    {{ product.description }}
                </p>

                <div class="price">
                    ₹{{ product.price }}
                </div>

                <a href="#" class="btn">
                    View Details
                </a>

            </div>

        </div>

        {% empty %}

        <h2>No Products Available</h2>

        {% endfor %}

    </div>

</div>

<footer>
    <p>&copy; 2026 Product Management System | Django Project</p>
</footer>

</body>
</html>
