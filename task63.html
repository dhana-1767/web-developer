<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Booking Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#1e3a8a;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#172554;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}

.hero{
    background:url('https://images.unsplash.com/photo-1566073771259-6a8506099945?w=1600')
    center/cover;
    height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.search-box{
    background:white;
    padding:20px;
    border-radius:10px;
    width:80%;
    max-width:900px;
}

.search-box input,
.search-box select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:5px;
}

.btn{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.hotel-section{
    padding:50px 10%;
}

.hotel-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.hotel-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.hotel-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.hotel-info{
    padding:20px;
}

.hotel-info h3{
    color:#1e3a8a;
}

.price{
    color:green;
    font-size:20px;
    margin:10px 0;
}

.booking-form{
    background:white;
    margin:50px auto;
    max-width:700px;
    padding:30px;
    border-radius:10px;
}

.booking-form input{
    width:100%;
    padding:12px;
    margin:10px 0;
}
</style>
</head>
<body>

<header>
    <h1>Luxury Stay Hotel Booking</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Hotels</a>
    <a href="#">Rooms</a>
    <a href="#">Bookings</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <div class="search-box">
        <h2>Find Your Perfect Stay</h2>

        <input type="text" placeholder="Destination">

        <input type="date">

        <input type="date">

        <select>
            <option>1 Guest</option>
            <option>2 Guests</option>
            <option>3 Guests</option>
        </select>

        <button class="btn">Search Hotels</button>
    </div>
</section>

<section class="hotel-section">

<h2>Popular Hotels</h2>

<div class="hotel-grid">

<div class="hotel-card">
<img src="https://images.unsplash.com/photo-1551882547-ff40c63fe5fa?w=800">

<div class="hotel-info">
<h3>Grand Palace Hotel</h3>
<p>⭐⭐⭐⭐⭐ Luxury Resort</p>
<p class="price">₹7,500 / Night</p>
<button class="btn">Book Now</button>
</div>
</div>

<div class="hotel-card">
<img src="https://images.unsplash.com/photo-1445019980597-93fa8acb246c?w=800">

<div class="hotel-info">
<h3>Ocean View Resort</h3>
<p>⭐⭐⭐⭐ Beachfront Stay</p>
<p class="price">₹5,200 / Night</p>
<button class="btn">Book Now</button>
</div>
</div>

<div class="hotel-card">
<img src="https://images.unsplash.com/photo-1522798514-97ceb8c4f1c8?w=800">

<div class="hotel-info">
<h3>City Comfort Inn</h3>
<p>⭐⭐⭐ Business Hotel</p>
<p class="price">₹3,100 / Night</p>
<button class="btn">Book Now</button>
</div>
</div>

</div>

</section>

<section class="booking-form">

<h2>Book Your Room</h2>

<form>
<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Phone Number" required>

<input type="date" required>

<input type="date" required>

<button class="btn">
Confirm Booking
</button>

</form>

</section>

</body>
</html>
