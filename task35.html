<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST API Frontend</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.form{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}
</style>
</head>
<body>

<div class="container">

    <h1>Product Management</h1>

    <div class="form">
        <input
            type="text"
            id="name"
            placeholder="Product Name">

        <input
            type="number"
            id="price"
            placeholder="Price">

        <button onclick="addProduct()">
            Add Product
        </button>
    </div>

    <div class="products" id="productList"></div>

</div>

<script>

const API_URL =
"http://localhost:3000/api/products";

/* GET PRODUCTS */

async function loadProducts(){

    try{

        const response =
        await fetch(API_URL);

        const products =
        await response.json();

        const productList =
        document.getElementById(
            "productList"
        );

        productList.innerHTML = "";

        products.forEach(product => {

            productList.innerHTML += `
            <div class="card">

                <h3>${product.name}</h3>

                <p>
                    ₹${product.price}
                </p>

            </div>
            `;
        });

    }catch(error){

        console.error(error);
    }
}

/* ADD PRODUCT */

async function addProduct(){

    const name =
    document.getElementById("name")
    .value;

    const price =
    document.getElementById("price")
    .value;

    if(!name || !price){

        alert(
            "Please fill all fields"
        );

        return;
    }

    await fetch(API_URL, {

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            name,
            price
        })
    });

    document.getElementById(
        "name"
    ).value = "";

    document.getElementById(
        "price"
    ).value = "";

    loadProducts();
}

loadProducts();

</script>

</body>
</html>
