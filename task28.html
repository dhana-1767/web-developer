<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Search</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:30px;
}

h1{
    text-align:center;
}

.search-box{
    max-width:500px;
    margin:20px auto;
}

.search-box input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.product{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

.product h3{
    margin:10px 0;
}
</style>
</head>
<body>

<h1>Product Search</h1>

<div class="search-box">
    <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
        onkeyup="searchProducts()"
    >
</div>

<div class="products" id="productList">

    <div class="product">
        <img src="https://picsum.photos/300/200?1">
        <h3>Wireless Headphones</h3>
    </div>

    <div class="product">
        <img src="https://picsum.photos/300/200?2">
        <h3>Smart Watch</h3>
    </div>

    <div class="product">
        <img src="https://picsum.photos/300/200?3">
        <h3>Bluetooth Speaker</h3>
    </div>

    <div class="product">
        <img src="https://picsum.photos/300/200?4">
        <h3>Running Shoes</h3>
    </div>

    <div class="product">
        <img src="https://picsum.photos/300/200?5">
        <h3>Laptop Backpack</h3>
    </div>

</div>

<script>

function searchProducts(){

    let input =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

    let products =
        document.querySelectorAll(".product");

    products.forEach(product => {

        let title =
            product.querySelector("h3")
            .textContent
            .toLowerCase();

        if(title.includes(input)){
            product.style.display = "block";
        }else{
            product.style.display = "none";
        }
    });
}

</script>

</body>
</html>
