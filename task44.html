<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Authentication</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f4f6f9;
}

.container{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    font-size:16px;
}

.register-btn{
    background:#28a745;
    margin-bottom:10px;
}

.login-btn{
    background:#007bff;
}

.profile-btn{
    background:#6f42c1;
    margin-top:10px;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h2>🔐 JWT Authentication</h2>

    <div class="input-group">
        <input type="text"
               id="name"
               placeholder="Full Name">
    </div>

    <div class="input-group">
        <input type="email"
               id="email"
               placeholder="Email Address">
    </div>

    <div class="input-group">
        <input type="password"
               id="password"
               placeholder="Password">
    </div>

    <button class="register-btn"
            onclick="registerUser()">
        Register
    </button>

    <button class="login-btn"
            onclick="loginUser()">
        Login
    </button>

    <button class="profile-btn"
            onclick="getProfile()">
        Get Profile
    </button>

    <div class="message" id="message"></div>

</div>

<script>

const API_URL = "http://localhost:5000/api/auth";

function showMessage(msg){
    document.getElementById("message").innerText = msg;
}

async function registerUser(){

    const name =
        document.getElementById("name").value;

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    try{

        const response = await fetch(
            `${API_URL}/register`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    name,
                    email,
                    password
                })
            }
        );

        const data = await response.json();

        showMessage(data.message);

    }catch(error){

        showMessage("Registration failed");
    }
}

async function loginUser(){

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    try{

        const response = await fetch(
            `${API_URL}/login`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await response.json();

        if(data.token){

            localStorage.setItem(
                "token",
                data.token
            );

            showMessage("Login Successful");
        }
        else{
            showMessage("Invalid Credentials");
        }

    }catch(error){

        showMessage("Login failed");
    }
}

async function getProfile(){

    const token =
        localStorage.getItem("token");

    if(!token){
        showMessage("Please login first");
        return;
    }

    try{

        const response = await fetch(
            "http://localhost:5000/api/profile",
            {
                method:"GET",
                headers:{
                    Authorization:
                    `Bearer ${token}`
                }
            }
        );

        const data = await response.json();

        showMessage(
            "Welcome: " +
            JSON.stringify(data.user)
        );

    }catch(error){

        showMessage(
            "Unauthorized Access"
        );
    }
}

</script>

</body>
</html>
