<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real-Time Chat System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f2f5;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:420px;
    height:650px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
}

.chat-header{
    background:#0d6efd;
    color:#fff;
    padding:15px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.user-status{
    display:flex;
    align-items:center;
    gap:10px;
}

.online-dot{
    width:10px;
    height:10px;
    background:#28a745;
    border-radius:50%;
}

.chat-body{
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f8f9fa;
}

.message{
    max-width:75%;
    padding:12px 15px;
    margin-bottom:12px;
    border-radius:15px;
    word-wrap:break-word;
}

.received{
    background:#e9ecef;
    color:#333;
}

.sent{
    background:#0d6efd;
    color:white;
    margin-left:auto;
}

.time{
    display:block;
    font-size:11px;
    margin-top:5px;
    opacity:0.7;
}

.chat-footer{
    padding:12px;
    display:flex;
    gap:10px;
    border-top:1px solid #ddd;
}

.chat-footer input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:25px;
    outline:none;
}

.chat-footer button{
    border:none;
    background:#0d6efd;
    color:#fff;
    padding:12px 20px;
    border-radius:25px;
    cursor:pointer;
}

.chat-footer button:hover{
    background:#0b5ed7;
}
</style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <div class="user-status">
            <div class="online-dot"></div>
            <div>
                <strong>Support Chat</strong><br>
                <small>Online</small>
            </div>
        </div>
    </div>

    <div class="chat-body" id="chatBody">

        <div class="message received">
            Welcome! How can I help you today?
            <span class="time">09:00 AM</span>
        </div>

    </div>

    <div class="chat-footer">
        <input
            type="text"
            id="messageInput"
            placeholder="Type your message..."
        >
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function getCurrentTime() {
    const now = new Date();
    return now.toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });
}

function sendMessage() {

    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if(text === "") return;

    const chatBody = document.getElementById("chatBody");

    const msg = document.createElement("div");
    msg.className = "message sent";
    msg.innerHTML = `
        ${text}
        <span class="time">${getCurrentTime()}</span>
    `;

    chatBody.appendChild(msg);

    input.value = "";

    chatBody.scrollTop = chatBody.scrollHeight;

    setTimeout(() => {

        const reply = document.createElement("div");
        reply.className = "message received";
        reply.innerHTML = `
            Message received successfully.
            <span class="time">${getCurrentTime()}</span>
        `;

        chatBody.appendChild(reply);

        chatBody.scrollTop = chatBody.scrollHeight;

    }, 1000);
}

document.getElementById("messageInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
