<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filter & Sorting Products</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.controls{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:30px;
}

input,select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    min-width:200px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.category{
    color:#777;
    font-size:14px;
}

.price{
    color:#2563eb;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>Product Filter & Sorting</h1>

<div class="controls">

    <input
        type="text"
        id="search"
        placeholder="Search Products"
    >

    <select id="category">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="fashion">Fashion</option>
        <option value="accessories">Accessories</option>
    </select>

    <select id="sort">
        <option value="">Sort By</option>
        <option value="nameAsc">Name A-Z</option>
        <option value="nameDesc">Name Z-A</option>
        <option value="priceAsc">Price Low-High</option>
        <option value="priceDesc">Price High-Low</option>
    </select>

</div>

<div class="products" id="productContainer"></div>

<script>

const products = [

{
    name:"Wireless Headphones",
    category:"electronics",
    price:2999,
    image:"https://picsum.photos/400/300?1"
},

{
    name:"Smart Watch",
    category:"electronics",
    price:4999,
    image:"https://picsum.photos/400/300?2"
},

{
    name:"Running Shoes",
    category:"fashion",
    price:1899,
    image:"https://picsum.photos/400/300?3"
},

{
    name:"Bluetooth Speaker",
    category:"electronics",
    price:1499,
    image:"https://picsum.photos/400/300?4"
},

{
    name:"Laptop Backpack",
    category:"accessories",
    price:999,
    image:"https://picsum.photos/400/300?5"
},

{
    name:"Travel Bag",
    category:"accessories",
    price:1299,
    image:"https://picsum.photos/400/300?6"
}

];

const container =
document.getElementById("productContainer");

function displayProducts(items){

    container.innerHTML = "";

    items.forEach(product => {

        container.innerHTML += `
        <div class="card">

            <img src="${product.image}" alt="">

            <div class="content">

                <div class="category">
                    ${product.category}
                </div>

                <h3>${product.name}</h3>

                <div class="price">
                    ₹${product.price}
                </div>

            </div>

        </div>
        `;
    });
}

function filterAndSort(){

    let search =
    document.getElementById("search")
    .value.toLowerCase();

    let category =
    document.getElementById("category")
    .value;

    let sort =
    document.getElementById("sort")
    .value;

    let filtered =
    products.filter(product => {

        let matchesSearch =
        product.name
        .toLowerCase()
        .includes(search);

        let matchesCategory =
        category === "all" ||
        product.category === category;

        return matchesSearch &&
               matchesCategory;
    });

    switch(sort){

        case "nameAsc":
            filtered.sort((a,b)=>
                a.name.localeCompare(b.name));
            break;

        case "nameDesc":
            filtered.sort((a,b)=>
                b.name.localeCompare(a.name));
            break;

        case "priceAsc":
            filtered.sort((a,b)=>
                a.price - b.price);
            break;

        case "priceDesc":
            filtered.sort((a,b)=>
                b.price - a.price);
            break;
    }

    displayProducts(filtered);
}

document
.getElementById("search")
.addEventListener("input",filterAndSort);

document
.getElementById("category")
.addEventListener("change",filterAndSort);

document
.getElementById("sort")
.addEventListener("change",filterAndSort);

displayProducts(products);

</script>

</body>
</html>
