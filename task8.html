<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbeafe;
      --radius: 28px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
      padding: 1.5rem;
      color: var(--text);
    }

    .otp-card {
      width: min(520px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 30px 90px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    .otp-header {
      padding: 2.5rem 2rem 1.5rem;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
    }

    .otp-header h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.75rem);
      line-height: 1.05;
    }

    .otp-header p {
      margin: 1rem 0 0;
      color: rgba(255,255,255,0.88);
      line-height: 1.75;
    }

    .otp-body {
      padding: 2rem;
      display: grid;
      gap: 1.5rem;
    }

    .step {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .description {
      color: var(--muted);
      line-height: 1.8;
    }

    .code-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.85rem;
    }

    .code-grid input {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--border);
      border-radius: 18px;
      font-size: 1.65rem;
      text-align: center;
      font-weight: 700;
      background: #f8fafc;
      color: var(--text);
    }

    .code-grid input:focus {
      outline: 2px solid rgba(37, 99, 235, 0.28);
      border-color: var(--primary);
      background: white;
    }

    .actions {
      display: grid;
      gap: 1rem;
    }

    .btn {
      width: 100%;
      padding: 1rem 1.1rem;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-secondary {
      background: #f8fafc;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .resend-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .resend-row a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .resend-row a:hover {
      text-decoration: underline;
    }

    @media (max-width: 580px) {
      .code-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .otp-body {
        padding: 1.5rem;
      }
    }

    @media (max-width: 420px) {
      .code-grid {
        gap: 0.5rem;
      }

      .code-grid input {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="otp-card">
    <div class="otp-header">
      <h1>Verify your phone</h1>
      <p>Enter the 6-digit code sent to <strong>+1 (555) 123-4567</strong>. The code expires in 10 minutes.</p>
    </div>
    <div class="otp-body">
      <div class="step">Step 2 of 3</div>
      <p class="description">We’ve sent a one-time passcode to your device for secure verification. Enter it below to continue.</p>
      <div class="code-grid">
        <input type="text" inputmode="numeric" maxlength="1" />
        <input type="text" inputmode="numeric" maxlength="1" />
        <input type="text" inputmode="numeric" maxlength="1" />
        <input type="text" inputmode="numeric" maxlength="1" />
        <input type="text" inputmode="numeric" maxlength="1" />
        <input type="text" inputmode="numeric" maxlength="1" />
      </div>
      <div class="actions">
        <button class="btn btn-primary" type="button">Verify code</button>
        <button class="btn btn-secondary" type="button">Use backup code</button>
      </div>
      <div class="resend-row">
        <span>Didn’t receive a code?</span>
        <a href="#">Resend code</a>
      </div>
    </div>
  </div>
</body>
</html>
