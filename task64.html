<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Delivery Platform</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:1200px;
    margin:20px auto;
}

.search-box input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:5px;
}

.food-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.price{
    color:#ff5722;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:#ff5722;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.cart{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
}

.cart ul{
    margin-top:10px;
}

.cart li{
    padding:5px 0;
}
</style>
</head>
<body>

<header>
    <h1>Food Delivery Platform</h1>
</header>

<div class="container">

<div class="search-box">
    <input type="text"
           id="search"
           placeholder="Search food..."
           onkeyup="searchFood()">
</div>

<div class="food-grid" id="foodGrid">

<div class="card food-item">
    <img src="https://via.placeholder.com/400x200">
    <div class="card-content">
        <h3>Veg Burger</h3>
        <p>Delicious burger with fresh vegetables.</p>
        <div class="price">₹120</div>
        <button onclick="addToCart('Veg Burger')">
            Add to Cart
        </button>
    </div>
</div>

<div class="card food-item">
    <img src="https://via.placeholder.com/400x200">
    <div class="card-content">
        <h3>Pizza</h3>
        <p>Cheesy pizza with toppings.</p>
        <div class="price">₹250</div>
        <button onclick="addToCart('Pizza')">
            Add to Cart
        </button>
    </div>
</div>

<div class="card food-item">
    <img src="https://via.placeholder.com/400x200">
    <div class="card-content">
        <h3>Pasta</h3>
        <p>Creamy Italian pasta.</p>
        <div class="price">₹180</div>
        <button onclick="addToCart('Pasta')">
            Add to Cart
        </button>
    </div>
</div>

</div>

<div class="cart">
    <h2>Cart</h2>
    <ul id="cartItems"></ul>
</div>

</div>

<script>

function addToCart(item){
    let cart =
    document.getElementById("cartItems");

    let li =
    document.createElement("li");

    li.textContent = item;

    cart.appendChild(li);
}

function searchFood(){

    let value =
    document.getElementById("search")
    .value.toLowerCase();

    let foods =
    document.querySelectorAll(".food-item");

    foods.forEach(food=>{
        food.style.display =
        food.innerText.toLowerCase()
        .includes(value)
        ? "block"
        : "none";
    });
}

</script>

</body>
</html>
