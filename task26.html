<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Gateway Integration</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.payment-card{
    background:white;
    padding:30px;
    width:350px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:10px;
}

.price{
    font-size:28px;
    color:#2563eb;
    font-weight:bold;
    margin:20px 0;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<div class="payment-card">

    <h2>Premium Plan</h2>

    <p>Access all premium features.</p>

    <div class="price">₹999</div>

    <button id="payBtn">Pay Now</button>

</div>

<script>

document.getElementById("payBtn").onclick = function(){

    var options = {

        key: "rzp_test_xxxxxxxxxxxx",

        amount: 99900,

        currency: "INR",

        name: "My E-Commerce Store",

        description: "Premium Subscription",

        handler: function(response){

            alert(
                "Payment Successful!\n\nPayment ID: " +
                response.razorpay_payment_id
            );
        },

        prefill: {
            name: "Customer Name",
            email: "customer@example.com",
            contact: "9876543210"
        },

        notes: {
            address: "Online Purchase"
        },

        theme: {
            color: "#2563eb"
        }
    };

    var rzp = new Razorpay(options);

    rzp.open();
};

</script>

</body>
</html>
