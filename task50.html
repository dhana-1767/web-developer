<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS API Integration</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    padding:25px;
    width:400px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    height:100px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#28a745;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#status{
    margin-top:15px;
    text-align:center;
}
</style>
</head>
<body>

<div class="container">
    <h2>Send SMS</h2>

    <form id="smsForm">
        <input type="tel" id="phone" placeholder="Mobile Number" required>

        <textarea id="message"
                  placeholder="Enter SMS Message"
                  required></textarea>

        <button type="submit">Send SMS</button>
    </form>

    <div id="status"></div>
</div>

<script>
document.getElementById("smsForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const phone = document.getElementById("phone").value;
    const message = document.getElementById("message").value;

    try {
        const response = await fetch("http://localhost:3000/send-sms", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                phone,
                message
            })
        });

        const data = await response.json();

        document.getElementById("status").innerHTML =
            data.message || "SMS Sent Successfully!";
    }
    catch(error){
        document.getElementById("status").innerHTML =
            "Failed to send SMS.";
    }
});
</script>

</body>
</html>
